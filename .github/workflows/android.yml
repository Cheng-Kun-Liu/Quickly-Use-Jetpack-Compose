name: Android CI

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ] # 当推送以 v 开头的标签时触发 release
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 赋予上传 Release 的权限
    env:
      GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4g -XX:+HeapDumpOnOutOfMemoryError"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    # 1. 优化 Gradle 缓存与执行 (使用官方推荐的 setup-gradle)
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run Lint
      run: ./gradlew lintDebug

    # 2. 上传 Lint 报告 (即使失败也会上传)
    - name: Upload Lint Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: lint-reports
        path: '**/build/reports/lint-results-*.html'
        if-no-files-found: ignore

    - name: Run Unit Tests
      if: always() # 即使 Lint 失败也运行测试，以便获取完整报告
      run: ./gradlew test # 运行所有模块的所有单元测试

    # 2. 上传测试报告
    - name: Upload Test Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-reports
        path: '**/build/reports/tests/**' # 扩大匹配范围，确保能抓取到所有测试报告
        if-no-files-found: ignore

    # 3. 生成 Baseline Profile
    # 注意：该步骤会启动 Gradle Managed Device (pixel6Api33)。
    # 使用 --no-configuration-cache 是因为 GMD 在某些 AGP 版本下与配置缓存存在兼容性问题
    - name: Enable KVM group perms
      run: |
        sudo chmod 666 /dev/kvm

    - name: Generate Baseline Profile
      run: ./gradlew :app:generateBaselineProfile -Pandroid.testoptions.manageddevices.emulator.gpu="swiftshader_indirect" --no-configuration-cache

    - name: Build All APKs and AABs
      run: ./gradlew assemble bundleRelease --no-configuration-cache

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: android-build-outputs
        path: |
          app/build/outputs/apk/
          app/build/outputs/bundle/

    # 4. 自动创建 GitHub Release 并上传产物 (仅在推送 tag 时触发)
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          app/build/outputs/apk/gp/release/*.apk
          app/build/outputs/apk/sam/release/*.apk
          app/build/outputs/bundle/gpRelease/*.aab
          app/build/outputs/bundle/samRelease/*.aab
        generate_release_notes: true
