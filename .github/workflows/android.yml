name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    # 1. 优化 Gradle 缓存与执行 (使用官方推荐的 setup-gradle)
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-home-cache-cleanup: true

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run Lint
      run: ./gradlew lintDebug

    # 2. 上传 Lint 报告 (即使失败也会上传)
    - name: Upload Lint Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: lint-reports
        path: '**/build/reports/lint-results-*.html'

    - name: Run Unit Tests
      run: ./gradlew testDebugUnitTest

    # 2. 上传测试报告 (即使失败也会上传)
    - name: Upload Test Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-reports
        path: '**/build/reports/tests/testDebugUnitTest/'

    # 3. 生成 Baseline Profile
    # 注意：该步骤会启动 Gradle Managed Device (pixel6Api33)。
    # GitHub Actions 的标准 runner (ubuntu-latest) 支持硬件加速 KVM。
    - name: Enable KVM group perms
      run: |
        sudo chmod 666 /dev/kvm

    - name: Generate Baseline Profile
      run: ./gradlew :app:generateBaselineProfile -Pandroid.testoptions.manageddevices.emulator.gpu="swiftshader_indirect"

    - name: Build All APKs
      run: ./gradlew assemble

    - name: Upload APKs
      uses: actions/upload-artifact@v4
      with:
        name: android-apks
        path: app/build/outputs/apk/
